<!DOCTYPE html>
<html lang="es-ES">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#31475f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Calendario">
    <title>{% block title %}Calendario de Turnos{% endblock %}</title>
    <link rel="manifest" href="{{ url_for('web_app_manifest') }}">
    <link rel="icon" href="{{ url_for('secret_static', filename='icons/icon-192.png') }}" type="image/png">
    <link rel="apple-touch-icon" href="{{ url_for('secret_static', filename='icons/apple-touch-icon.png') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('secret_static', filename='style.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="nav-title">Calendario de Turnos</h1>
            <button id="navToggle" class="nav-toggle" type="button" aria-expanded="false" aria-controls="siteNav" aria-label="Abrir menú">
                <span class="nav-toggle-bar"></span>
                <span class="nav-toggle-bar"></span>
                <span class="nav-toggle-bar"></span>
            </button>
            <ul id="siteNav" class="nav-links">
                <li><a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint in ['index', 'calendar_view'] %}is-active{% endif %}">Calendario</a></li>
                <li><a href="{{ url_for('settings') }}" class="nav-link {% if request.endpoint == 'settings' %}is-active{% endif %}">Reglas</a></li>
                <li><a href="{{ url_for('absences') }}" class="nav-link {% if request.endpoint == 'absences' %}is-active{% endif %}">Ausencias</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <script>
    (function() {
        const navToggle = document.getElementById('navToggle');
        const siteNav = document.getElementById('siteNav');
        if (!navToggle || !siteNav) return;

        function closeNav() {
            navToggle.setAttribute('aria-expanded', 'false');
            siteNav.classList.remove('is-open');
        }

        navToggle.addEventListener('click', function() {
            const isOpen = navToggle.getAttribute('aria-expanded') === 'true';
            navToggle.setAttribute('aria-expanded', String(!isOpen));
            siteNav.classList.toggle('is-open', !isOpen);
        });

        siteNav.querySelectorAll('a').forEach((link) => {
            link.addEventListener('click', closeNav);
        });

        document.addEventListener('click', function(event) {
            if (!siteNav.classList.contains('is-open')) return;
            if (siteNav.contains(event.target) || navToggle.contains(event.target)) return;
            closeNav();
        });

        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeNav();
            }
        });
    })();
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
